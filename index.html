<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MarioCraft</title>
  <link rel="stylesheet" href="styles.css?v=46">
</head>
<body>

<div id="game-wrapper">
  <canvas id="game-canvas"></canvas>

  <!-- HUD bar -->
  <div id="hud">
    <button id="btn-mode">✎ Edit Map</button>
    <button id="btn-char">👤 Select Char</button>
    <button id="btn-char-editor">🎨 Char Editor</button>
    <button id="btn-start-over">↺ Start Over</button>
    <!-- Edit-mode tools (hidden in play mode) -->
    <div id="edit-tools" style="display:none; gap:6px; align-items:center;">
      <button id="btn-reset">⚠ Clear Map Edits</button>
    </div>
    <!-- Coin counter (hidden in edit mode) -->
    <span id="hud-coins"><span id="hud-coin-icon">●</span> ×<span id="hud-coin-count">00</span></span>
  </div>

  <!-- Touch controls (hidden in edit mode) -->
  <div id="controls">
    <!-- D-pad -->
    <div id="dpad">
      <div id="btn-up"    class="dpad-btn"></div>
      <div id="btn-left"  class="dpad-btn"></div>
      <div id="dpad-center"></div>
      <div id="btn-right" class="dpad-btn"></div>
      <div id="btn-down"  class="dpad-btn"></div>
    </div>

    <!-- Action buttons -->
    <div id="action-buttons">
      <div id="btn-b" class="action-btn">B</div>
      <div id="btn-a" class="action-btn">A</div>
    </div>
  </div>
</div>

<!-- Portrait rotation prompt -->
<div id="rotate-overlay">
  <div class="icon">📱</div>
  <div>Rotate to landscape to play</div>
</div>

<!-- Character Editor overlay (populated by char-editor.js) -->
<div id="char-editor-overlay" style="display:none"></div>

<!-- Character Select overlay -->
<div id="char-select-overlay">
  <div id="char-select-box">
    <div id="char-select-title">CHOOSE YOUR CHARACTER</div>
    <div id="char-cards"></div>
    <button id="btn-char-play">PLAY!</button>
  </div>
</div>

<!-- Level Clear overlay -->
<div id="level-clear-overlay">
  <div id="level-clear-box">
    <div id="level-clear-title">LEVEL CLEAR!</div>
    <div id="level-clear-coins"></div>
    <button id="btn-play-again">Play Again</button>
    <button id="btn-clear-map">Reset Map</button>
  </div>
</div>

<script type="module" src="src/main.js?v=46"></script>
</body>
</html>
